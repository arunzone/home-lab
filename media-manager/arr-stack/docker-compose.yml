---

x-common-keys: &common-keys
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    dns:
      - 1.1.1.1
      - 1.0.0.1
    networks:
      - arr_network

services:

  traefik:
    <<: *common-keys
    image: traefik:v3.6
    container_name: traefik
    security_opt:
      - no-new-privileges:true
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Attach the static configuration tls.yaml file that contains the tls configuration settings
      - "--providers.file.filename=/dynamic/tls.yaml"

      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=arr_network"

      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    labels:
      # Enable self‑routing
      - "traefik.enable=true"

      # Dashboard router
      - "traefik.http.routers.dashboard.rule=Host(`traefik.home.arpa`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"

      # Basic‑auth middleware
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/certs:/certs:ro
      - ./traefik/dynamic:/dynamic:ro


  qbittorrent:
    <<: *common-keys
    image: ghcr.io/hotio/qbittorrent
    container_name: qbittorrent
    environment:
      - LIBTORRENT=v1
      # VPN
      - VPN_ENABLED=true
      - VPN_CONF=wg0
      - VPN_PROVIDER=generic
      - VPN_LAN_NETWORK=192.168.1.0/24
      - VPN_AUTO_PORT_FORWARD=false
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config:/config
      - ${ROOT_DIR}/torrents:/data:rw
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.home.arpa`)
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

  jellyfin:
    <<: *common-keys
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin.home.arpa #optional
    volumes:
      - jellyfin:/config
      - ${ROOT_DIR}/media/tv:/data/tvshows
      - ${ROOT_DIR}/media/movies:/data/movies
      - ${ROOT_DIR}/media/musicvideos:/data/musicvideos
    ports:
      - 7359:7359/udp
      - "8096:8096"
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.home.arpa`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

  flaresolverr:
    <<: *common-keys
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    shm_size: '1gb' # Crucial for Chromium-based apps to prevent crashes
    deploy:
      resources:
        limits:
          memory: 2G # Prevents FlareSolverr from ever eating the whole LXC
    environment:
      - LOG_LEVEL=info
      - DISABLE_IPV6=true
      - BROWSER_TIMEOUT=90000 # Increased for stability

  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - prowlarr:/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.home.arpa`)
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.routers.prowlarr.tls=true
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696

  radarr:
    <<: *common-keys
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - radarr:/config
      - ${ROOT_DIR}:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.home.arpa`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.services.radarr.loadbalancer.server.port=7878

  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - sonarr:/config
      - ${ROOT_DIR}:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.home.arpa`)
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.services.sonarr.loadbalancer.server.port=8989

  lidarr:
    <<: *common-keys
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - lidarr:/config
      - ${ROOT_DIR}:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.home.arpa`)
      - traefik.http.routers.lidarr.entrypoints=websecure
      - traefik.http.routers.lidarr.tls=true
      - traefik.http.services.lidarr.loadbalancer.server.port=8686

  bazarr:
    <<: *common-keys
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - bazarr:/config
      - ${ROOT_DIR}:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=Host(`bazarr.home.arpa`)
      - traefik.http.routers.bazarr.entrypoints=websecure
      - traefik.http.routers.bazarr.tls=true
      - traefik.http.services.bazarr.loadbalancer.server.port=6767

volumes:
  radarr:
  sonarr:
  prowlarr:
  lidarr:
  bazarr:
  jellyfin:

networks:
  arr_network:
    name: arr_network
