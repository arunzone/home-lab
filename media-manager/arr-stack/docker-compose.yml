---

x-common-keys: &common-keys
    restart: unless-stopped
    logging:
      driver: json-file
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    dns:
      - 1.1.1.1
      - 1.0.0.1

services:

  qbittorrent:
    <<: *common-keys
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./config:/config
      - ${ROOT_DIR}/data/torrents:/data:rw
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

