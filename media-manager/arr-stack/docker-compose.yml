---

x-common-keys: &common-keys
    restart: unless-stopped
    logging:
      driver: json-file
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    dns:
      - 1.1.1.1
      - 1.0.0.1

services:
  radarr:
    <<: *common-keys
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    volumes:
      - radarr:/config
      - ${ROOT_DIR}/media/movies:/movies #optional
      - ${ROOT_DIR}/torrents/movies:/downloads #optional
    ports:
      - 7878:7878

  sonarr:
    <<: *common-keys
    image: ghcr.io/hotio/sonarr:latest
    container_name: sonarr
    volumes:
      - sonarr:/config
      - ${ROOT_DIR}/media/tv:/tv #optional
      - ${ROOT_DIR}/torrents/tv:/downloads #optional
    ports:
      - 8989:8989

  prowlarr:
    <<: *common-keys
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - prowlarr:/config
    ports:
      - 9696:9696

  qbittorrent:
    <<: *common-keys
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./config:/config
      - ${ROOT_DIR}/torrents:/data:rw
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

  jellyfin:
    <<: *common-keys
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - JELLYFIN_PublishedServerUrl=http://192.168.0.5 #optional
    volumes:
      - jellyfin:/config
      - ${ROOT_DIR}/media/tv:/data/tvshows
      - ${ROOT_DIR}/media/movies:/data/movies
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional

volumes:
  radarr:
  sonarr:
  prowlarr:
  jellyfin:

networks:
  default:
    name: arr_network
